<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Formation Commerciale — TableMaster</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root { --blue:#0066FF; --blue-light:#0066FF10; --black:#000; --gray:#8E8E93; --gray-light:#E5E5EA; --bg:#F2F2F7; --white:#FFF; --green:#10B981; --red:#EF4444; --amber:#F59E0B; --r:16px; --rs:12px; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--black); line-height:1.7; }
    .wrap { max-width:960px; margin:0 auto; padding:16px; }

    header { background:var(--white); border-bottom:1px solid var(--gray-light); padding:16px 0; position:sticky; top:0; z-index:10; margin-bottom:20px; }
    .hdr { max-width:960px; margin:0 auto; padding:0 16px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .logo { font-size:20px; font-weight:700; letter-spacing:-.5px; } .logo span { color:var(--blue); }
    .badge { font-size:11px; background:var(--blue-light); color:var(--blue); padding:4px 12px; border-radius:100px; font-weight:600; }

    /* Nav */
    .mods { display:flex; overflow-x:auto; gap:8px; padding-bottom:4px; -webkit-overflow-scrolling:touch; scrollbar-width:none; flex-wrap:nowrap; }
    .mods::-webkit-scrollbar{display:none;}
    .mod-btn { white-space:nowrap; padding:10px 16px; border-radius:var(--rs); border:1px solid var(--gray-light); background:var(--white); font-size:13px; font-weight:500; color:var(--gray); cursor:pointer; transition:all .15s; flex-shrink:0; }
    .mod-btn:hover{ border-color:var(--blue); color:var(--blue); }
    .mod-btn.active{ background:var(--blue); color:var(--white); border-color:var(--blue); font-weight:600; }
    .mod-btn.done{ border-color:var(--green); }
    .mod-btn.done::after{ content:' ✓'; color:var(--green); font-weight:700; }

    .mod-btn-new { border-color:var(--amber); background:#FFFBEB; color:#92400E; }
    .mod-btn-new::after { content:' ★'; color:var(--amber); }

    /* Cards */
    .card { background:var(--white); border:1px solid var(--gray-light); border-radius:var(--r); padding:28px; margin-bottom:16px; }
    .card h2 { font-size:22px; font-weight:700; margin-bottom:12px; letter-spacing:-.3px; }
    .card h3 { font-size:17px; font-weight:600; margin:24px 0 12px; }
    .card h4 { font-size:15px; font-weight:600; margin:18px 0 8px; color:var(--black); }
    .card p,.card li { font-size:15px; color:var(--gray); margin-bottom:8px; }
    .card .sub { font-size:15px; color:var(--gray); margin-bottom:24px; }
    .card ul { padding-left:20px; }
    .card ul li { margin-bottom:6px; }
    .card strong { color:var(--black); }
    .card em { color:var(--blue); font-style:normal; }

    /* Boxes */
    .box { background:var(--bg); border-radius:var(--rs); padding:16px 20px; margin:16px 0; }
    .box-blue { background:var(--blue-light); border-left:4px solid var(--blue); }
    .box-green { background:#ECFDF5; border-left:4px solid var(--green); }
    .box-amber { background:#FFFBEB; border-left:4px solid var(--amber); }
    .box-red { background:#FEF2F2; border-left:4px solid var(--red); }
    .box-title { font-size:14px; font-weight:600; color:var(--black); margin-bottom:6px; }

    /* Schema */
    .schema { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin:20px 0; }
    .s-box { background:var(--bg); border-radius:var(--rs); padding:20px 16px; text-align:center; }
    .s-box .ico { font-size:30px; margin-bottom:8px; }
    .s-box .lbl { font-size:14px; font-weight:600; color:var(--black); }
    .s-box .sbt { font-size:12px; color:var(--gray); margin-top:4px; line-height:1.4; }
    .schema-arrow { display:flex; align-items:center; justify-content:center; color:var(--blue); font-size:22px; font-weight:700; }

    /* Feature grid */
    .fg { display:grid; gap:12px; margin:20px 0; }
    .fg-2 { grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); }
    .ft { display:flex; align-items:flex-start; gap:14px; padding:16px; background:var(--bg); border-radius:var(--rs); }
    .ft .fi { font-size:26px; flex-shrink:0; width:40px; text-align:center; }
    .ft .fx { flex:1; }
    .ft .ftl { font-size:15px; font-weight:600; color:var(--black); }
    .ft .ftd { font-size:13px; color:var(--gray); margin-top:4px; line-height:1.5; }

    /* Plans */
    .plans { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; margin:20px 0; }
    .pc { background:var(--bg); border-radius:var(--rs); padding:24px; text-align:center; border:2px solid transparent; }
    .pc.pop { border-color:var(--blue); background:var(--blue-light); }
    .pc .pn { font-size:17px; font-weight:700; margin-bottom:4px; }
    .pc .pp { font-size:30px; font-weight:700; color:var(--blue); margin-bottom:4px; }
    .pc .pp span { font-size:14px; font-weight:400; color:var(--gray); }
    .pc ul { list-style:none; text-align:left; font-size:13px; color:var(--gray); margin-top:14px; }
    .pc ul li { padding:5px 0; }
    .pc ul li::before { content:'✓ '; color:var(--green); font-weight:700; }
    .pop-badge { background:var(--blue); color:white; font-size:11px; padding:3px 14px; border-radius:100px; display:inline-block; margin-bottom:8px; font-weight:600; }

    /* Tabs */
    .tabs { display:flex; gap:4px; margin-bottom:20px; background:var(--bg); border-radius:var(--rs); padding:4px; }
    .tab { flex:1; padding:12px; border-radius:10px; border:none; background:transparent; font-size:14px; font-weight:500; color:var(--gray); cursor:pointer; text-align:center; }
    .tab:hover{color:var(--black);}
    .tab.active{background:var(--white);color:var(--black);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08);}

    /* Quiz */
    .qq { background:var(--bg); border-radius:var(--rs); padding:20px; margin-bottom:14px; }
    .qq .qt { font-size:15px; font-weight:600; color:var(--black); margin-bottom:12px; }
    .qq .qo { display:flex; flex-direction:column; gap:8px; }
    .qq .qob { padding:12px 16px; border-radius:var(--rs); border:1px solid var(--gray-light); background:var(--white); font-size:14px; cursor:pointer; text-align:left; transition:all .15s; }
    .qq .qob:hover{ border-color:var(--blue); background:var(--blue-light); }
    .qq .qob.correct{ border-color:var(--green); background:#ECFDF5; color:#065F46; font-weight:600; }
    .qq .qob.wrong{ border-color:var(--red); background:#FEF2F2; color:#991B1B; font-weight:600; }
    .qq .qob:disabled{ cursor:default; opacity:.7; }
    .feedback{ margin-top:10px; font-size:14px; font-weight:500; }
    .feedback.correct{ color:#065F46; }
    .feedback.wrong{ color:#991B1B; }

    .score-bar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
    .score{ font-size:18px; font-weight:700; }
    .score.ok{ color:var(--green); } .score.ko{ color:var(--red); }
    .reset-btn{ font-size:13px; color:var(--blue); background:none; border:none; cursor:pointer; font-weight:500; }

    /* Glossary */
    .gloss-term { font-weight:700; color:var(--black); font-size:15px; margin-top:16px; }
    .gloss-def { font-size:14px; color:var(--gray); margin-bottom:16px; padding-left:12px; border-left:3px solid var(--gray-light); }

    /* Script */
    .script { background:var(--white); border-left:4px solid var(--blue); padding:14px 18px; border-radius:0 8px 8px 0; margin:8px 0 16px; font-size:14px; color:var(--blue); font-style:italic; line-height:1.7; }

    @media(max-width:600px){
      .card{padding:18px;}
      .card h2{font-size:20px;}
      .schema{grid-template-columns:1fr 1fr;}
      .plans{grid-template-columns:1fr;}
      .tabs{flex-direction:column;}
      .mods{gap:6px;}
      .mod-btn{padding:8px 12px; font-size:12px;}
    }
  </style>
</head>
<body>
  <header>
    <div class="hdr">
      <div class="logo">Table<span>Master</span></div>
      <span class="badge">Formation Commerciale</span>
    </div>
  </header>
  <div class="wrap">
    <div class="mods" id="mods"></div>
    <div id="content"></div>
  </div>

<script>
const M = [
  {
    id:'intro', name:'Accueil', sections:[{
      id:'learn',
      content:'<div class="card"><h2>Bienvenue dans la formation TableMaster</h2><p class="sub">Cette page est votre guide complet pour maîtriser le produit TableMaster et le vendre efficacement.</p><div class="box box-blue"><div class="box-title">🎯 Objectif de cette formation</div><p style="font-size:14px;color:var(--gray);margin:0">À la fin de cette formation, vous saurez : <strong>expliquer ce qu\'est TableMaster</strong>, <strong>faire une démonstration</strong>, <strong>répondre à toutes les questions</strong> d\'un restaurateur, et <strong>conclure une vente</strong>.</p></div><h3>Comment utiliser cette page ?</h3><ul><li>Chaque onglet en haut correspond à un <strong>module de formation</strong>.</li><li>Dans chaque module, vous avez un onglet <strong>📖 Apprendre</strong> (le contenu à connaître) et un onglet <strong>❓ Quiz</strong> (pour tester vos connaissances).</li><li>Quand vous réussissez tous les quiz d\'un module, une coche <strong>✓</strong> apparaît.</li><li>Vos scores sont sauvegardés — vous pouvez revenir plus tard.</li></ul><div class="box box-amber"><div class="box-title">⚠️ Important</div><p style="font-size:14px;color:var(--gray);margin:0">Cette formation part du principe que vous n\'avez <strong>aucune connaissance technique</strong>. Chaque terme est expliqué simplement. Prenez votre temps, faites les modules dans l\'ordre.</p></div></div>'
    }]
  },
  {
    id:'presentation', name:'TableMaster',
    sections:[
      {
        id:'learn',
        content:'<div class="card"><h2>Qu\'est-ce que TableMaster ?</h2><p class="sub">Une explication simple, sans jargon, pour comprendre le produit que vous vendez.</p><div class="box box-blue"><div class="box-title">📌 Définition simple</div><p style="font-size:15px;color:var(--gray);margin:0">TableMaster est un <strong>site internet</strong> (on appelle ça une <em>plateforme SaaS</em>) qui aide les restaurants à <strong>gérer leurs réservations</strong>. Au lieu d\'utiliser un carnet papier ou de répondre au téléphone toute la journée, le restaurateur se connecte à TableMaster sur son ordinateur ou son téléphone, et il voit toutes ses réservations au même endroit.</p></div><h3>Pourquoi les restaurants en ont besoin ?</h3><div class="fg fg-2"><div class="ft"><div class="fi">📞</div><div class="fx"><div class="ftl">Le téléphone, c\'est chronophage</div><div class="ftd">Un restaurateur passe en moyenne <strong>1 à 2 heures par jour</strong> au téléphone pour prendre des réservations. C\'est du temps qu\'il ne passe pas en salle avec ses clients.</div></div></div><div class="ft"><div class="fi">📋</div><div class="fx"><div class="ftl">Le carnet papier, c\'est risqué</div><div class="ftd">Une réservation mal notée, une page arrachée, une écriture illisible... et c\'est une table vide ou un client mécontent.</div></div></div><div class="ft"><div class="fi">🕐</div><div class="fx"><div class="ftl">Les clients veulent réserver 24h/24</div><div class="ftd"><strong>70% des réservations en ligne</strong> sont faites en dehors des heures d\'ouverture du restaurant. Sans système en ligne, ces clients vont chez le concurrent.</div></div></div><div class="ft"><div class="fi">💸</div><div class="fx"><div class="ftl">Les commissions, c\'est de l\'argent perdu</div><div class="ftd">TheFork prend <strong>2€ par couvert</strong>. Sur 500 couverts/mois = <strong>1000€ de commissions</strong>. TableMaster, c\'est <strong>39€/mois</strong>, quel que soit le nombre de couverts.</div></div></div></div><h3>Comment ça marche, concrètement ?</h3><div class="schema"><div class="s-box"><div class="ico">🏪</div><div class="lbl">1. Le restaurant s\'inscrit</div><div class="sbt">Il crée son compte en 5 minutes. Il renseigne son nom, son adresse, ses horaires.</div></div><div class="s-box"><div class="ico">🔗</div><div class="lbl">2. Il obtient un bouton</div><div class="sbt">Un bouton « Réserver » à installer sur son site web. Ou un lien à partager.</div></div><div class="s-box"><div class="ico">👤</div><div class="lbl">3. Le client réserve</div><div class="sbt">Il choisit une date, une heure, un nombre de personnes. Il reçoit un email de confirmation.</div></div><div class="s-box"><div class="ico">📱</div><div class="lbl">4. Le resto est notifié</div><div class="sbt">Notification sur son téléphone. Il peut confirmer ou refuser en un clic.</div></div></div><div class="box box-green"><div class="box-title">✅ Ce que TableMaster n\'est PAS</div><p style="font-size:14px;color:var(--gray);margin:0">TableMaster <strong>n\'est pas</strong> un site de réservation comme TheFork ou LaFourchette. TableMaster ne prend <strong>aucune commission</strong> et ne fait <strong>pas de mise en avant</strong> du restaurant. C\'est un <strong>outil de travail</strong> pour le restaurateur, pas une place de marché.</p></div></div>'
      },
      {
        id:'quiz',
        content:'<div class="card"><h3>Quiz — TableMaster</h3><div id="quiz-presentation"></div><div id="score-presentation" class="score-bar" style="margin-top:16px"></div></div>'
      }
    ]
  },
  {
    id:'plans', name:'Plans & Prix',
    sections:[
      {
        id:'learn',
        content:'<div class="card"><h2>Les plans tarifaires</h2><p class="sub">Comprendre ce que chaque plan contient et à qui le vendre.</p><div class="plans"><div class="pc"><div class="pn">Pack Gestion</div><div class="pp">39€<span>/mois</span></div><ul><li>400 réservations / mois</li><li>Notifications push</li><li>Widget standard</li><li>Emails automatiques</li><li>Export des données</li><li>Support par email</li></ul></div><div class="pc pop"><div class="pop-badge">⭐ Recommandé</div><div class="pn">Pack Croissance</div><div class="pp">69€<span>/mois</span></div><ul><li>Réservations illimitées</li><li>Widget personnalisable</li><li>URL personnalisée</li><li>Comptes serveurs illimités</li><li>Support prioritaire</li><li>Demandes d\'avis Google</li></ul></div></div><h3>Quand recommander chaque plan ?</h3><div class="box box-blue"><div class="box-title">🧑‍🍳 Pack Gestion (39€/mois)</div><p style="font-size:14px;color:var(--gray);margin:0">Idéal pour les <strong>petits restaurants</strong> (moins de 30 couverts par service) qui veulent simplement <strong>arrêter le cahier papier</strong>. Ils n\'ont pas besoin de personnaliser le widget, le design par défaut leur suffit.</p></div><div class="box box-blue"><div class="box-title">🏢 Pack Croissance (69€/mois)</div><p style="font-size:14px;color:var(--gray);margin:0">Idéal pour les restaurants qui veulent <strong>une image de marque cohérente</strong> (personnalisation aux couleurs du resto), qui ont une <strong>équipe en salle</strong> (comptes serveurs), ou qui font plus de <strong>400 réservations par mois</strong>. C\'est le plan que nous recommandons dans <strong>90% des cas</strong> car la personnalisation est importante pour l\'image du restaurant.</p></div><h3>L\'essai gratuit de 14 jours</h3><div class="box box-green"><div class="box-title">🆓 Aucun risque pour le restaurateur</div><p style="font-size:14px;color:var(--gray);margin:0">Les 14 premiers jours sont <strong>totalement gratuits</strong>. Le restaurateur peut tester <strong>toutes</strong> les fonctionnalités sans engagement. Sa carte bancaire n\'est <strong>pas débitée</strong> avant la fin de l\'essai. Il peut annuler à tout moment. C\'est un argument très fort : « Vous ne payez que si vous êtes convaincu. »</p></div></div>'
      },
      {
        id:'quiz',
        content:'<div class="card"><h3>Quiz — Plans & Prix</h3><div id="quiz-plans"></div><div id="score-plans" class="score-bar" style="margin-top:16px"></div></div>'
      }
    ]
  },
  {
    id:'widget', name:'Le Widget',
    sections:[
      {
        id:'learn',
        content:'<div class="card"><h2>Le widget de réservation</h2><p class="sub">Le widget, c\'est le bouton magique qui transforme un site web en outil de réservation. Voici comment ça marche.</p><div class="box box-blue"><div class="box-title">📌 Qu\'est-ce qu\'un widget ?</div><p style="font-size:15px;color:var(--gray);margin:0">Un <strong>widget</strong> (prononcez « ouidjette »), c\'est un petit bouton qu\'on ajoute sur un site internet. Vous l\'avez déjà vu : c\'est le bouton de chat en direct de beaucoup de sites, ou le bouton « Commander » d\'un site de vente en ligne. TableMaster fournit un widget « <strong>Réserver une table</strong> » que le restaurateur installe sur son propre site.</p></div><h3>Comment le client voit le widget ?</h3><div class="schema"><div class="s-box"><div class="ico">🔘</div><div class="lbl">Le client voit un bouton</div><div class="sbt">Un bouton flottant en bas à droite du site, toujours visible même en scrollant.</div></div><div class="s-box"><div class="ico">👆</div><div class="lbl">Il clique dessus</div><div class="sbt">Une fenêtre s\'ouvre <strong>par-dessus</strong> le site, sans le quitter.</div></div><div class="s-box"><div class="ico">📝</div><div class="lbl">Il remplit le formulaire</div><div class="sbt">Nom, email, téléphone, date, heure, nombre de personnes.</div></div><div class="s-box"><div class="ico">✅</div><div class="lbl">Réservation confirmée</div><div class="sbt">Le client reçoit un email. Le resto reçoit une notification.</div></div></div><h3>Les deux façons d\'utiliser le widget</h3><div class="fg fg-2"><div class="ft"><div class="fi">🔗</div><div class="fx"><div class="ftl">Lien direct (tous les plans)</div><div class="ftd">Une simple URL comme <em>tablemaster.fr/mon-restaurant</em>. Le restaurateur la met dans sa bio Instagram, sur sa page Facebook, dans ses emails, ou en QR code sur sa vitrine. Rien à installer.</div></div></div><div class="ft"><div class="fi">📜</div><div class="fx"><div class="ftl">Script à installer (tous les plans)</div><div class="ftd">Une ligne de code à copier-coller sur son site. Le bouton « Réserver une table » apparaît automatiquement en bas à droite de chaque page. Compatible WordPress, Wix, Shopify, Webflow, et tout site HTML.</div></div></div></div><h3>Où le restaurateur installe-t-il le widget ?</h3><p>TableMaster fournit des <strong>instructions pas à pas</strong> pour chaque plateforme :</p><ul><li><strong>WordPress</strong> : via un bloc HTML personnalisé (2 clics)</li><li><strong>Wix</strong> : via l\'élément « HTML intégré »</li><li><strong>Shopify</strong> : via une section HTML personnalisée</li><li><strong>Webflow</strong> : via l\'élément « Embed »</li><li><strong>Site HTML classique</strong> : une balise &lt;script&gt; à placer avant &lt;/body&gt;</li></ul><div class="box box-green"><div class="box-title">💡 Ce qu\'il faut dire au restaurateur</div><p style="font-size:14px;color:var(--gray);margin:0">« L\'installation prend <strong>2 minutes</strong>. Vous copiez une ligne, vous la collez sur votre site, et c\'est fait. Si vous êtes bloqué, on le fait pour vous. »</p></div></div>'
      },
      {
        id:'quiz',
        content:'<div class="card"><h3>Quiz — Le Widget</h3><div id="quiz-widget"></div><div id="score-widget" class="score-bar" style="margin-top:16px"></div></div>'
      }
    ]
  },
  {
    id:'reservations', name:'Réservations',
    sections:[
      {
        id:'learn',
        content:'<div class="card"><h2>Gérer les réservations</h2><p class="sub">Une fois que le widget est installé et que les clients réservent, que voit le restaurateur ? Voici le tableau de bord en détail.</p><h3>La vue liste</h3><p>La vue par défaut. Toutes les réservations s\'affichent les unes en dessous des autres, comme une liste de mails.</p><div class="fg fg-2"><div class="ft"><div class="fi">🔍</div><div class="fx"><div class="ftl">Recherche et filtres</div><div class="ftd">Cherchez par nom de client, filtrez par date, statut (en attente, confirmé, terminé), ou service (midi/soir).</div></div></div><div class="ft"><div class="fi">👈</div><div class="fx"><div class="ftl">Swipe sur mobile</div><div class="ftd">Sur téléphone, glissez une réservation vers la droite pour la <strong>confirmer</strong>, vers la gauche pour l\'<strong>annuler</strong>. Un geste, c\'est tout.</div></div></div><div class="ft"><div class="fi">🔔</div><div class="fx"><div class="ftl">Actions depuis la notification</div><div class="ftd">Quand une nouvelle réservation arrive, le restaurateur peut la <strong>valider ou la refuser directement depuis la notification</strong>, sans même ouvrir l\'application.</div></div></div><div class="ft"><div class="fi">📊</div><div class="fx"><div class="ftl">Statistiques en direct</div><div class="ftd">En haut de la liste : nombre de réservations du jour, couverts prévus, tendances.</div></div></div></div><h3>La vue calendrier</h3><p>Une alternative visuelle à la liste. Le restaurateur voit ses réservations sur un calendrier, comme un agenda.</p><div class="fg fg-2"><div class="ft"><div class="fi">📅</div><div class="fx"><div class="ftl">Trois modes d\'affichage</div><div class="ftd"><strong>Jour</strong> : un planning détaillé avec les créneaux du midi et du soir. <strong>Semaine</strong> : toutes les résas de la semaine en un coup d\'œil. <strong>Mois</strong> : chaque jour du mois avec un indicateur visuel de remplissage.</div></div></div><div class="ft"><div class="fi">🟢</div><div class="fx"><div class="ftl">Code couleur d\'occupation</div><div class="ftd">Vert = faible occupation, jaune = moyen, orange = élevé, rouge = presque complet. Le restaurateur sait d\'un coup d\'œil si sa salle est pleine.</div></div></div><div class="ft"><div class="fi">➕</div><div class="fx"><div class="ftl">Création rapide</div><div class="ftd">Sur mobile, un bouton <strong>+</strong> flottant permet de créer une réservation en quelques secondes (pour un appel téléphonique).</div></div></div></div><h3>La fiche de réservation</h3><p>Quand le restaurateur clique sur une réservation, il voit tous les détails :</p><ul><li><strong>Nom du client</strong>, téléphone (appel en un clic), email</li><li><strong>Date et heure</strong> de la réservation</li><li><strong>Nombre de personnes</strong></li><li><strong>Statut</strong> : en attente, confirmée, annulée, terminée</li><li><strong>Actions</strong> : confirmer, annuler, modifier, supprimer</li><li><strong>Notes</strong> : le restaurateur peut ajouter des remarques</li></ul><div class="box box-green"><div class="box-title">💡 Argument</div><p style="font-size:14px;color:var(--gray);margin:0">« Vous avez une vue complète de votre salle en un coup d\'œil. Vous savez combien de couverts sont prévus, à quelle heure, et par qui. Plus jamais de double réservation ou de table vide à cause d\'une erreur de carnet. »</p></div></div>'
      },

one ou son ordinateur (même quand il n\'a pas TableMaster ouvert)</li><li><strong>Email</strong> : un email à chaque événement</li><li><strong>Les deux</strong> : pour ne rien rater</li></ul><p>Il peut aussi choisir pour quels événements il est notifié : nouvelle réservation, confirmation, annulation, modification.</p></div>'

z le soir. Vous commandez les bonnes quantités, vous prévoyez le bon nombre de serveurs. »</div></div><div class="box"><div class="box-title">5. 🔔 Réactivité</div><p style="font-size:14px;color:var(--gray);margin:0">Dès qu\'une réservation est faite le restaurateur est notifié sur son téléphone. Il valide ou refuse en un clic. Le client reçoit une confirmation <strong>instantanée</strong>.</p><div class="script">« Vous êtes au marché, vous recevez une notification : une table de 6 pour ce soir. Vous validez en 2 secondes, le client reçoit sa confirmation. Simple. »</div></div><div class="box"><div class="box-title">6. 🎯 Le prix d\'un couvert</div><p style="font-size:14px;color:var(--gray);margin:0">39€/mois = le prix de <strong>2 à 3 couverts</strong>. C\'est amorti dès la première semaine. Pour moins de 2€ par jour, le restaurant a un outil professionnel.</p><div class="script">« Pour le prix de deux cafés par jour, vous avez un système de réservation complet. »</div></div><h3>Les objections fréquentes et comment y répondre</h3><div class="box box-red"><div class="box-title">❌ « Je n\'ai pas de site internet »</div><p style="font-size:14px;color:var(--gray);margin:0">→ Vous n\'en avez pas besoin ! TableMaster vous fournit un <strong>lien direct</strong> que vous pouvez partager sur Facebook, Instagram, ou mettre en QR code sur votre vitrine. Vos clients cliquent et réservent.</p></div><div class="box box-red"><div class="box-title">❌ « Je ne suis pas à l\'aise avec l\'informatique »</div><p style="font-size:14px;color:var(--gray);margin:0">→ C\'est fait pour ! L\'interface est <strong>ultra simple</strong>, comme WhatsApp ou votre appli météo. Et si vous êtes bloqué, on est là pour vous aider par téléphone. On peut même le configurer avec vous.</p></div><div class="box box-red"><div class="box-title">❌ « Mes clients préfèrent appeler »</div><p style="font-size:14px;color:var(--gray);margin:0">→ Et vous pouvez continuer à prendre leurs appels ! Vous créez la réservation vous-même dans TableMaster en 30 secondes. Le système remplace votre carnet, pas votre téléphone.</p></div><div class="box box-red"><div class="box-title">❌ « C\'est trop cher »</div><p style="font-size:14px;color:var(--gray);margin:0">→ 39€ par mois, c\'est <strong>moins de 2€ par jour</strong>. Un couvert vous rapporte au moins 30€. Il vous suffit de <strong>2 couverts supplémentaires par mois</strong> (grâce aux réservations en ligne) pour que ce soit rentable. Et les 14 premiers jours sont gratuits pour tester.</p></div><div class="box box-red"><div class="box-title">❌ « Je suis déjà sur TheFork / LaFourchette »</div><p style="font-size:14px;color:var(--gray);margin:0">→ TableMaster n\'est pas un concurrent de TheFork, c\'est un <strong>complément</strong>. TheFork vous apporte des <strong>nouveaux clients</strong>. TableMaster gère <strong>vos clients existants</strong> et vos réservations directes (celles pour lesquelles vous ne payez aucune commission). Les deux peuvent coexister.</p></div><h3>Comment faire une démonstration efficace</h3><ol style="padding-left:20px"><li style="margin-bottom:8px;font-size:14px;color:var(--gray)"><strong>Ouvrez le widget</strong> sur votre téléphone. Montrez le bouton, cliquez, remplissez le formulaire.</li><li style="margin-bottom:8px;font-size:14px;color:var(--gray)"><strong>Montrez la notification</strong> qui arrive instantanément.</li><li style="margin-bottom:8px;font-size:14px;color:var(--gray)"><strong>Ouvrez le tableau de bord</strong>, montrez la réservation qui vient d\'apparaître.</li><li style="margin-bottom:8px;font-size:14px;color:var(--gray)"><strong>Confirmez-la</strong> en un clic.</li><li style="margin-bottom:8px;font-size:14px;color:var(--gray)"><strong>Montrez le fichier client</strong> : « Et voilà, ce client est maintenant enregistré. La prochaine fois qu\'il réserve, vous saurez tout de lui. »</li></ol><div class="box box-green"><div class="box-title">✅ L\'objectif de la démo</div><p style="font-siz nalyser.</div><div class="gloss-term">API</div><div class="gloss-def">« Interface de programmation ». C\'est ce qui permet à deux logiciels de communiquer entre eux. Le restaurateur n\'a pas besoin de comprendre ce que c\'est, c\'est technique et géré par TableMaster.</div><div class="gloss-term">Stripe</div><div class="gloss-def">La plateforme de paiement utilisée par TableMaster pour gérer les abonnements. Stripe est utilisée par des milliers d\'entreprises dans le monde (Amazon, Google, Deliveroo). C\'est 100% sécurisé.</div></div>'

    else if(done) cls+=' done';
    else if(m.id==='glossaire') cls+=' mod-btn-new';
    return `<button class="${cls}" onclick="sel('${m.id}')">${m.name}</button>`;
  }).join('');
}
function sel(id){activeModule=id;activeSection='learn';render();}
function content(){
  const mod=M.find(m=>m.id===activeModule); if(!mod) return;
  const sec=mod.sections.find(s=>s.id===activeSection); if(!sec) return;
  let h='<div class="tabs">';
  mod.sections.forEach(s=>{h+=`<button class="tab${s.id===activeSection?' active':''}" onclick="selSec('${s.id}')">${s.id==='learn'?'📖 Apprendre':'❓ Quiz'}</button>`;});
  h+='</div>'+sec.content;
  document.getElementById('content').innerHTML=h;
  if(activeSection==='quiz') renderQuiz(activeModule);
}
function selSec(id){activeSection=id;render();}

function renderQuiz(mid){
  const quiz=Q[mid]; if(!quiz) return;
  const s=getS(mid);
  let h=''; quiz.forEach((q,qi)=>{h+=`<div class="qq"><div class="qt">${qi+1}. ${q.q}</div><div class="qo">${q.opts.map((o,oi)=>`<button class="qob${typeof q.answered!=='undefined'?(oi===q.correct?' correct':(oi===q.selected&&!q.correctAns?' wrong':'')):''}" onclick="ans('${mid}',${qi},${oi})"${typeof q.answered!=='undefined'?' disabled':''}>${o}</button>`).join('')}</div></div>`;});
  const el=document.getElementById('quiz-'+mid); if(el) el.innerHTML=h;
  const sc=document.getElementById('score-'+mid); if(sc) sc.innerHTML=`<span class="score${s.correct===s.total&&s.total>0?' ok':' ko'}">Score : ${s.correct}/${s.total}</span><button class="reset-btn" onclick="rst('${mid}')">🔄 Recommencer</button>`;
}
function ans(mid,qi,oi){
  const quiz=Q[mid]; if(!quiz||typeof quiz[qi].answered!=='undefined') return;
  const correct=oi===quiz[qi].correct;
  quiz[qi].answered=true; quiz[qi].selected=oi; quiz[qi].correctAns=correct;
  if(!scores[mid]) scores[mid]={correct:0,total:0};
  scores[mid].total++; if(correct) scores[mid].correct++; save();
  const el=document.getElementById('quiz-'+mid); if(!el) return;
  const qq=el.querySelectorAll('.qq')[qi]; const opts=qq.querySelectorAll('.qob');
  opts.forEach((b,i)=>{b.disabled=true; if(i===quiz[qi].correct) b.classList.add('correct'); if(i===oi&&!correct) b.classList.add('wrong');});
  const fb=document.createElement('div'); fb.className='feedback '+(correct?'correct':'wrong');
  fb.textContent=correct?'✓ Bonne réponse !':`✗ Réponse : ${quiz[qi].opts[quiz[qi].correct]}`;
  qq.appendChild(fb);
  mods(); const sc=document.getElementById('score-'+mid);
  const s=getS(mid); if(sc) sc.innerHTML=`<span class="score${s.correct===s.total&&s.total>0?' ok':' ko'}">Score : ${s.correct}/${s.total}</span><button class="reset-btn" onclick="rst('${mid}')">🔄 Recommencer</button>`;
}
function rst(mid){delete scores[mid];const q=Q[mid];if(q)q.forEach(x=>delete x.answered);save();render();}

render();
</script>
