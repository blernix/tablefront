# Configuration Nginx optimisée pour TableMaster - SEO & Performance
# À déployer dans /etc/nginx/sites-available/tablemaster.fr

# ============================================
# REDIRECTION WWW -> NON-WWW & HTTP -> HTTPS
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name tablemaster.fr www.tablemaster.fr;
    
    # Redirection permanente HTTP -> HTTPS et WWW -> NON-WWW
    return 301 https://tablemaster.fr$request_uri;
}

# ============================================
# CONFIGURATION PRINCIPALE HTTPS
# ============================================
server {
    server_name tablemaster.fr;

    # ============================================
    # SECURITY HEADERS (Optimisés pour SEO)
    # ============================================
    # HSTS - Force HTTPS pour 2 ans, inclut subdomains, précharge
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Protection XSS
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Prévention du MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Référent policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # IMPORTANT: NE PAS ajouter X-Frame-Options ici - Laissé à Next.js pour gérer les pages embed
    # IMPORTANT: NE PAS ajouter Content-Security-Policy ici - Laissé à Next.js

    # ============================================
    # WIDGET.JS - PRIORITÉ ABSOLUE (Backend port 4001)
    # ============================================
    location = /widget.js {
        proxy_pass http://localhost:4001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Headers CORS pour accessibilité du widget
        add_header Access-Control-Allow-Origin * always;
        add_header Cross-Origin-Resource-Policy cross-origin always;
        
        # Cache pour performances
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ============================================
    # BACKEND API (Port 4001)
    # ============================================
    location /api/ {
        proxy_pass http://localhost:4001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts augmentés pour uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ============================================
    # HEALTH CHECK
    # ============================================
    location /health {
        proxy_pass http://localhost:4001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ============================================
    # FICHIERS STATIQUES CACHÉS (Frontend port 3030)
    # ============================================
    # Sitemap et robots.txt - Pas de cache pour les crawlers
    location = /sitemap.xml {
        proxy_pass http://localhost:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600"; # 1 heure de cache
    }
    
    location = /robots.txt {
        proxy_pass http://localhost:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=86400"; # 24 heures de cache
    }
    
    # Favicon - Cache long
    location = /favicon.ico {
        proxy_pass http://localhost:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=604800"; # 1 semaine de cache
    }
    
    # Autres fichiers statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        # Exclure widget.js déjà traité
        if ($uri = /widget.js) {
            break;
        }
        expires 1y;
        add_header Cache-Control "public, immutable";
        proxy_pass http://localhost:3030;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # FRONTEND NEXT.JS (Port 3030) - CATCH-ALL
    # ============================================
    location / {
        proxy_pass http://localhost:3030;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ============================================
    # LOGGING
    # ============================================
    access_log /var/log/nginx/tablemaster.access.log;
    error_log /var/log/nginx/tablemaster.error.log;

    # ============================================
    # CONFIGURATION SSL (GÉRÉ PAR CERTBOT)
    # ============================================
    listen [::]:443 ssl http2;
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/tablemaster.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tablemaster.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Optimisation SSL
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
}

# ============================================
# REDIRECTION WWW VERS NON-WWW (HTTPS)
# ============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.tablemaster.fr;
    
    ssl_certificate /etc/letsencrypt/live/tablemaster.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tablemaster.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # Redirection permanente WWW -> NON-WWW
    return 301 https://tablemaster.fr$request_uri;
}